version: '3'

tasks:
  build-mod:
    desc: Build minecraft mod with gradle wrapper
    cmds:
      - chmod +x ./gradlew
      - ./gradlew build
      - mkdir -p ./build-artifacts
      - find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-javadoc.jar' -exec cp {} ./build-artifacts/ \;